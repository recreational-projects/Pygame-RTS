[project]
name = "CondaRTS"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pygame-ce>=2.5.5",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "ruff>=0.15.13",
]

[tool.ruff]
line-length = 120  # for both linter and formatter

[tool.ruff.lint]
future-annotations = true
select = [
    "F401", # unused import
    "I", # isort
    "UP", # pyupgrade
]
extend-safe-fixes = [
    "TC",
]
