[project]
name = "CondaRTS"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pygame-ce>=2.5.5",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "ruff>=0.15.13",
]

[tool.ruff]
line-length = 120  # for both linter and formatter

[tool.ruff.lint]
future-annotations = true
select = [
    "ANN201", # missing-return...public-function
    "ANN202", #...private-function
    "D212", # multi-line-summary-first-line
    "E", # pycodestyle
    "F",
    "I", # isort
    "UP", # pyupgrade
]
ignore = [
    "COM812", # missing-trailing-comma: conflicts with formatter
]
extend-safe-fixes = [
    "TC",
]

[tool.ruff.lint.per-file-ignores]
"CondaRTS*" = [
    "ANN",
    "D",
    "E",
    "E501", # line-too-long
    "F841",
]
